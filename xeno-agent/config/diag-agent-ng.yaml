default_agent: engineer

compaction:
  preset: minimal

skills:
  paths:
    - "./skills/"
  include_default: false
  instruction:
    mode: metadata
    max_skills: 20
  # skill:// URI resolution: when load_skills in task/new_task receives a
  # skill:// URI, the SkillURIResolver resolves it via registered providers.
  # "local" provider is automatically registered for skills discovered from
  # the paths above. Reference URIs like
  #   skill://local/diagnosis-planning/references/flowchart.md
  # load only the referenced file, not the full SKILL.md.
storage:
  title_generation_model: "openai-chat:svc/glm-4.7"

observability:
  enabled: false
  provider:
    type: custom
    endpoint: "http://phoenix.ai.rootcloud.info/"
    service_name: "agentpool"
    protocol: "http/protobuf"

# Session Pool Architecture 配置
# 启用后，AgentPool 将使用 SessionPool 管理会话生命周期
session_pool:
  enable_auto_resume: true # 自动恢复挂起的 turn
  enable_event_bus: true # 启用跨协议事件总线
  session_ttl_seconds: 3600 # 会话过期时间（秒）
  max_auto_resume: 10 # 最大自动恢复次数
  max_queue_size: 1000 # EventBus 队列大小
  mcp_max_processes: 100 # MCP 进程上限

.anchors:
  question_tool: &question_tool
    type: question
    description: |-
      Ask the user a clarifying question with structured options.

      Use this tool for ALL user interactions requiring input or choices.

      **CRITICAL**: Must provide response_schema with enum for the question to render properly.

      Parameters:
      - prompt: The question text to display
      - response_schema: JSON schema with enum defining expected response options

      **REQUIRED response_schema formats**:

      1. Single choice (most common):
         {
           "type": "string",
           "enum": ["Option A", "Option B", "Option C"]
         }

      2. Single choice with descriptions:
         {
           "type": "string",
           "enum": ["PostgreSQL", "MySQL", "SQLite"],
           "x-option-descriptions": {
             "PostgreSQL": "Best for production workloads",
             "MySQL": "Compatible with many tools",
             "SQLite": "Lightweight, file-based"
           }
         }

      3. Multiple choice:
         {
           "type": "array",
           "items": {
             "type": "string",
             "enum": ["Auth", "API", "Analytics"]
           }
         }

      **MUST include enum field** - Without enum, the UI cannot render selectable options.

  question_for_user_tool: &question_for_user_tool
    type: custom
    import_path: xeno_agent.agentpool.resource_providers:QuestionForUserProvider
    kw_args:
      schemas:
        question_for_user: ./tools/question_for_user.yaml

  background_task_capability: &background_task_capability
    # BackgroundTaskCapability: sync + async task delegation with status query and cancellation
    # Replaces SubagentTools.task() — supports async_mode=true for background execution
    type: xeno_agent.agentpool.capabilities.BackgroundTaskCapability
    args:
      schemas:
        task: ./tools/task.yaml
        background_output: ./tools/background_output.yaml
        background_cancel: ./tools/background_cancel.yaml
      enabled_tools: ["task", "background_output", "background_cancel"]
      force_retrieval: directive
      max_concurrent_tasks: 10
      notification_debounce_ms: 500  # Debounce window for batching notifications (ms)
      notification_deliver_timeout: 5.0  # Timeout for delivering a batched notification (s)

model_variants:
  ack-dev:
    type: string
    identifier: "openai-chat:svc/kimi-k2"
  glm47:
    type: string
    identifier: "openai-chat:svc/glm-4.7"
  qwen37:
    type: string
    identifier: "openai-chat:dashscope/qwen3.7-plus"
  glm52:
    type: string
    identifier: "openai-chat:dashscope/glm-5.2"
  kimi-k2.7:
    type: string
    identifier: "openai-chat:dashscope/kimi-k2.7-code"

mcp_servers:
  - type: streamable-http
    name: knowledge_base
    url: "http://10.147.252.33:8722/mcp"
    enabled_tools: ["search_kb"]
agents:
  engineer:
    type: native
    model: ack-dev
    description: |
      General-purpose equipment technical assistant with intelligent routing capabilities.
      Handles routine equipment inquiries, manual retrieval, parameter queries, and
      basic technical Q&A. Automatically detects fault diagnosis scenarios and escalates
      to systematic troubleshooting workflow when needed. Serves as the primary entry
      point for all equipment-related interactions.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/technical_assistant_ng.j2"
        variables:
          LANG: "简体中文(zh-CN)"
    tools:
      - *question_for_user_tool
      - type: custom
        import_path: "xeno_agent.agentpool.resource_providers.XenoPlanProvider"
        kw_args:
          schemas:
            update_todo_list: "./tools/update_todo_list.yaml"
    capabilities:
      - *background_task_capability
    mcp_servers:
      - type: streamable-http
        name: expert-anno
        url: "http://10.147.252.33:3343/mcp"
        enabled_tools: ["request_comment"]
        timeout: 3600

  librarian:
    type: native
    model: glm47
    description: |
      Investigates specific topics deeply and generates structured reports. Output format and organization are guided by domain-specific skills. Use when research-backed documentation is needed; avoid for pure report generation without investigation.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/material_assistant_ng.j2"
        variables:
          LANG: "简体中文(zh-CN)"

  exam_designer:
    type: native
    model: glm47
    description: |
      Specialized agent for generating structured test dataset by learning from unstructured historical case database \
      or synthesizing realistic test cases based on domain expertise.
    system_prompt:
      - type: file
        content: ""
        path: "./prompts/roles/exam_designer.j2"
        variables:
          LANG: "简体中文(zh-CN)"
      - type: file
        content: ""
        path: "./prompts/capabilities/citation.j2"
