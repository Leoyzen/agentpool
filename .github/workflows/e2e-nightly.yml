name: E2E Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:  # manual trigger

env:
  FORCE_COLOR: 1
  RUFF_OUTPUT_FORMAT: github
  COLUMNS: 120
  # API credentials for real_model / e2e tests requiring live API access.
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
  TEST_DEFAULT_MODEL: ${{ secrets.TEST_DEFAULT_MODEL }}

jobs:
  e2e-full:
    name: L4 full e2e suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: L4 full e2e suite
        run: uv run pytest -m e2e --timeout=600 --tb=short --no-cov -q
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            /tmp/pytest-*.txt
            test-results/
          retention-days: 14
          if-no-files-found: ignore
