# ruff — Astral's Python linter and formatter
# https://docs.astral.sh/ruff/configuration/

line-length = 100
extend-exclude = ["docs"]
target-version = "py313"
# First-party import resolution paths (includes tests for import sorting).
src = ["src", "tests"]

[lint]
future-annotations = true
select = [
  "A",      # Flake8-builtins
  # "ANN",  # Flake8-Annotations — TODO: enable to replace mypy disallow_untyped_defs
  "ASYNC",  # Flake8-Async
  # "ARG",  # Flake8-Unused-Arguments
  "B",      # flake8-bugbear
  "BLE",    # Flake8-blind-except
  "C",
  "C4",     # flake8-comprehensions
  # "C90",  # MCCabe
  "COM",    # Flake8-commas
  # "CPY",  # Copyright-related rules
  "D",      # PyDocStyle
  # "DTZ",  # Flake8-Datetimez
  "E",      # PyCodeStyle Error
  "EM",     # flake8-errmsg
  # "ERA",  # Eradicate
  "EXE",    # flake8-executable
  "F",      # PyFlakes
  "FA",     # flake8-future-annotations
  # "FBT",  # flake8-boolean-trap
  # "FIX",  # flake8-fixme
  "FLY",    # flynt
  "G",      # flake8-logging-format
  "I",      # ISort
  "ICN",    # Flake8-import-conventions
  "INP",    # flake8-no-pep420
  "INT",    # flake8-gettext
  "ISC",    # flake8-implicit-str-concat
  "N",      # pep8-naming
  # "NPY",  # numpy-specific rules
  # "PD",   # pandas-vet
  "PERF",   # perflint
  # "PGH",  # pygrep-hooks
  "PIE",    # flake8-pie
  "PLE",    # PyLint Error
  "PLC",    # PyLint convention
  "PLW",    # PyLint Warning
  "PLR",    # PyLint refactor
  "PT",     # flake8-pytest-style
  "PTH",    # flake8-use-pathlib
  "PYI",    # flake8-pyi
  "Q",      # flake8-quotes
  "RET",    # flake8-return
  "RSE",    # flake8-raise
  "RUF",    # ruff-specific rules
  # "S",    # flake8-bandit
  "SIM",    # flake8-simplify
  "SLF",    # flake8-self
  "SLOT",   # flake8-slots
  # "T",
  # "TD",   # flake8-todos
  "T10",    # flake8-debugger
  # "T20",  # flake8-print
  "TC",     # flake8-type-checking
  "TID",    # flake8-tidy-imports
  "TRY",    # tryceratops
  "UP",     # PyUpgrade
  "W",      # PyCodeStyle warning
  "YTT",    # flake8-2020
]
ignore = [
  "C408",    # Unnecessary {obj_type} call (rewrite as a literal)
  "C901",    # {name} is too complex ({complexity} > {max_complexity})
  "COM812",
  # "CPY001", # Missing copyright notice at top of file
  "D100",    # Missing docstring in public module
  "D102",    # Missing docstring in public method
  "D103",    # Missing docstring in public function
  "D105",    # Missing docstring in magic method
  "D107",    # Missing docstring in __init__
  "D203",    # 1 blank line required before class docstring
  "D204",    # 1 blank line required after class docstring
  "D213",    # Multi-line docstring summary should start at the second line
  "D401",    # First line of docstring should be in imperative mood: "{first_line}"
  "D408",    # Section underline should be in the line following the section's name ("{name}")
  "D413",    # Missing blank line after last section ("{name}")
  "EM101",   # Exception must not use a string literal, assign to variable first
  "EM102",   # Exception must not use an f-string literal, assign to variable first
  "ISC001",
  "PLC0415",
  "PLR0912", # Too many branches
  "PLR0913", # Too many arguments to function call
  # "PLR2004", # Magic values instead of named consts
  "SLF001",  # Private member accessed
  "TRY003",  # Avoid specifying long messages outside the exception class
  "TC006",   # runtime-cast-value
]

[lint.flake8-quotes]
docstring-quotes = "double"

[lint.flake8-type-checking]
runtime-evaluated-base-classes = [
  "pydantic.BaseModel",
  "sqlalchemy.orm.DeclarativeBase",
  "schemez.Schema",
  "acp.base.Schema",
  "sqlmodel.SQLModel",
]
runtime-evaluated-decorators = [
  "pydantic.validate_call",
  "fastapi.FastAPI.get",
  "fastapi.FastAPI.post",
  "fastapi.APIRouter.get",
  "fastapi.APIRouter.post",
  "fastapi.APIRouter.put",
  "fastapi.APIRouter.delete",
  "fastapi.APIRouter.patch",
  "fastmcp.FastMCP.tool",
  "typer.Typer.command",
]

[lint.isort]
lines-after-imports = 2
# lines-between-types = 1
# atomic = true
force-sort-within-sections = true
combine-as-imports = true

[lint.mccabe]
max-complexity = 15

[lint.per-file-ignores]
"__init__.py" = ["E402", "I001"]
"scripts/*" = ["INP001"]
"*tests/*" = ["D100", "PLR2004"]
"docs/examples/**/*.py" = [
  "TC001",
] # Examples don't need TYPE_CHECKING imports

[format]
preview = true
