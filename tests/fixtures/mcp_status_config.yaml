  collision_agent:
    type: native
    model: test:test-model
    system_prompt: "Collision test agent"
    mcp_servers:
      - name: kb
        type: stdio
        command: echo
        args: [kb]
        enabled: false

mcp_servers:
  - name: fake_kb
    type: stdio
    command: echo
    args: [fake]
    enabled: false

  - name: kb
    type: stdio
    command: echo
    args: [kb]
    enabled: false
