          <skill name="openspec-propose" description="Propose a new change with all artifacts generated in one step. Use when the user wants to quickly describe what they want to build and get a complete
          proposal with design, specs, and tasks ready for implementation." />

          <skill name="systematic-debugging" description="Use when encountering any bug, test failure, or unexpected behavior, before proposing fixes" />

          <skill name="metaskill" description="The meta-skill: create AI agent teams, individual agents, or custom skills for any project. Use when the user wants to generate a complete .claude/ agent team,
          create a single agent, or create a single skill." />

          <skill name="uv-package-manager" description="Master the uv package manager for fast Python dependency management, virtual environments, and modern Python project workflows. Use when setting up
          Python projects, managing dependencies, or optimizing Python development workflows with uv." />

          <skill name="darwin-skill" description="Darwin Skill (达尔文.skill): autonomous skill optimizer inspired by Karpathy&#x27;s autoresearch. Evaluates SKILL.md files using an 8-dimension rubric (structure
          + effectiveness), runs hill-climbing with git version control, validates improvements through test prompts, and generates visual result cards. Use when user mentions &quot;优化skill&quot;, &quot;skill评分&quot;,
          &quot;自动优化&quot;, &quot;auto optimize&quot;, &quot;skill质量检查&quot;, &quot;达尔文&quot;, &quot;darwin&quot;, &quot;帮我改改skill&quot;, &quot;skill怎么样&quot;, &quot;提升skill质量&quot;, &quot;skill review&quot;,
          &quot;skill打分&quot;." />

          <skill name="brainstorm-okrs" description="Brainstorm team-level OKRs aligned with company objectives -- qualitative objectives with measurable key results. Use when setting quarterly OKRs, aligning
          team goals with company strategy, drafting objectives, or learning how to write effective OKRs." />

          <skill name="code-review-expert" description="Expert code review of current git changes with a senior engineer lens. Detects SOLID violations, security risks, and proposes actionable improvements."
          />

          </available-skills>

          You are team_lead, a member of team "unknown".

          Your role is: lead.


          ## Team Communication Protocol


          1. Use `send_message` to communicate with other team members.

          2. Use `task_create` and `task_update` to track work items.

          3. Use `read_blackboard` and `write_blackboard` to share context.

          4. Use `team_status` to check the status of all members.

          5. If you are the lead, you may use `team_create` and `team_delete`.


          ## Guidelines


          - Keep messages concise and actionable.

          - Update task status promptly when work is completed.

          - Check the blackboard before starting new work to avoid duplication.

          - Report blockers to the lead via `send_message` with message_type="escalation".



          ## Your Capabilities (Lead)


          - You can broadcast to all members via `send_message` with `to="*"`.

          - You can create and delete teams, delete blackboard keys, and shut down members.



          ## Eligible Agents


          The following agents can be used as team members in `team_create`:

          - `team_lead`: You are a team lead. Use team tools to coordinate members.

          - `team_member`: You are a team member. Follow instructions from the lead.'
        role: system
      - content:
        - text: 'Create a team named "test_team" with one member: name="assistant", agent="team_member"'
          type: text
        role: user
      model: svc/deepseek-v4-flash
      stream: true
      stream_options:
        include_usage: true
      tool_choice: auto
      tools:
      - function:
          description: "Load a Claude Code Skill and return its instructions.\n\nArgs:\n    ctx: Agent context providing access to pool and skills\n    skill_name: Name of the skill to load, or a skill://\
            \ URI.\n        Use skill:// URI to load a specific reference file:\n        skill://skill-name/references/file.md\n    arguments: Optional space-separated arguments for substitution\n\nReturns:\n\
            \    The full skill instructions for execution"
          name: load_skill
          parameters:
            additionalProperties: false
            properties:
              arguments:
                anyOf:
                - type: string
                - type: 'null'
                default: null
                description: Optional space-separated arguments for substitution
              skill_name:
                description: 'Name of the skill to load, or a skill:// URI.

                  Use skill:// URI to load a specific reference file:

                  skill://skill-name/references/file.md'
                type: string
            required:
            - skill_name
            type: object
        type: function
      - function:
          description: "List all available skills.\n\nReturns:\n    Formatted list of available skills with descriptions and URI information"
          name: list_skills
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: "Send a message to a teammate's inbox.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    to: Recipient member name. ``\"*\"`` broadcasts to all members\n        (lead-only\
            \ -- returns error for non-lead agents).\n    body: Message body text.\n    urgent: If True, deliver via steer (mid-turn injection);\n        otherwise queue for next turn.\n    message_type:\
            \ Optional message type tag. If the type is in\n        ``config.auto_urgent``, ``urgent`` is forced to ``True``.\n\nReturns:\n    Success or error message string."
          name: send_message
          parameters:
            additionalProperties: false
            properties:
              body:
                description: Message body text.
                type: string
              message_type:
                default: ''
                description: 'Optional message type tag. If the type is in

                  ``config.auto_urgent``, ``urgent`` is forced to ``True``.'
                type: string
              to:
                description: 'Recipient member name. ``"*"`` broadcasts to all members

                  (lead-only -- returns error for non-lead agents).'
                type: string
              urgent:
                default: false
                description: 'If True, deliver via steer (mid-turn injection);

                  otherwise queue for next turn.'
                type: boolean
            required:
            - to
            - body
            type: object
        type: function
      - function:
          description: "Create a task on the shared task board.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    subject: Short task title.\n    description: Optional longer description.\n   \
            \ blocked_by: Optional list of task_ids this task depends on.\n\nReturns:\n    Success message with task_id, or error string."
          name: task_create
          parameters:
            additionalProperties: false
            properties:
              blocked_by:
                anyOf:
                - items:
                    type: string
                  type: array
                - type: 'null'
                default: null
                description: Optional list of task_ids this task depends on.
              description:
                default: ''
                description: Optional longer description.
                type: string
              subject:
                description: Short task title.
                type: string
            required:
            - subject
            type: object
        type: function
      - function:
          description: "List all tasks on the shared task board.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n\nReturns:\n    JSON array of tasks (pretty-printed), or error string."
          name: task_list
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: "Update a task's status or owner on the shared task board.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    task_id: ID of the task to update.\n    status: New status (e.g.\
            \ \"in_progress\", \"completed\"). Empty = no change.\n    owner: New owner name. Empty = no change.\n\nReturns:\n    Updated task as JSON, or error string."
          name: task_update
          parameters:
            additionalProperties: false
            properties:
              owner:
                default: ''
                description: New owner name. Empty = no change.
                type: string
              status:
                default: ''
                description: New status (e.g. "in_progress", "completed"). Empty = no change.
                type: string
              task_id:
                description: ID of the task to update.
                type: string
            required:
            - task_id
            type: object
        type: function
      - function:
          description: "Read a key from the shared blackboard.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    key: Blackboard key to read.\n\nReturns:\n    JSON value + metadata, or \"Key not\
            \ found\" / error string."
          name: read_blackboard
          parameters:
            additionalProperties: false
            properties:
              key:
                description: Blackboard key to read.
                type: string
            required:
            - key
            type: object
          strict: true
        type: function
      - function:
          description: "Write a key to the shared blackboard with optimistic locking.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    key: Blackboard key to write.\n    value: Value to store.\n\
            \    expected_version: Expected current version for optimistic locking.\n        If None, no version check is performed.\n\nReturns:\n    \"Written, version=N\" on success, or \"Conflict: current\
            \ version is N\"."
          name: write_blackboard
          parameters:
            additionalProperties: false
            properties:
              expected_version:
                anyOf:
                - type: integer
                - type: 'null'
                default: null
                description: 'Expected current version for optimistic locking.

                  If None, no version check is performed.'
              key:
                description: Blackboard key to write.
                type: string
              value:
                description: Value to store.
                type: string
            required:
            - key
            - value
            type: object
        type: function
      - function:
          description: "List all keys on the shared blackboard.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n\nReturns:\n    JSON array of key names, or error string."
          name: list_blackboard
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: "Get the current status of the team.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n\nReturns:\n    Formatted status string with team name, members, and status."
          name: team_status
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: "Create a new team with eligible members (lead-only).\n\nPass ``members`` as a list of dicts with ``agent`` (registered agent\nname) and ``name`` (display name) keys. Only agents\
            \ listed in\n``member_eligible`` can be used. If ``defaults`` is configured and\n``members`` is empty, default members from config are used.\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n\
            \    name: Human-readable team name.\n    members: List of member dicts, each with ``agent`` and ``name``\n        keys.\n\nReturns:\n    Success message with team_id, or error string."
          name: team_create
          parameters:
            additionalProperties: false
            properties:
              members:
                description: 'List of member dicts, each with ``agent`` and ``name``

                  keys.'
                items:
                  additionalProperties:
                    type: string
                  properties: {}
                  type: object
                type: array
              name:
                description: Human-readable team name.
                type: string
            required:
            - name
            - members
            type: object
        type: function
      - function:
          description: "Delete the current team and close all member sessions (lead-only).\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n\nReturns:\n    ``\"Team deleted\"`` on success, or error\
            \ string."
          name: team_delete
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: "Delete a key from the shared blackboard (lead-only).\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    key: Blackboard key to delete.\n\nReturns:\n    ``\"Blackboard key\
            \ '{key}' deleted\"`` on success, or error string."
          name: delete_blackboard
          parameters:
            additionalProperties: false
            properties:
              key:
                description: Blackboard key to delete.
                type: string
            required:
            - key
            type: object
          strict: true
        type: function
      - function:
          description: "Shut down a specific team member (lead-only).\n\nArgs:\n    ctx: RunContext with AgentContext deps.\n    member_name: Name of the member to shut down.\n\nReturns:\n    ``\"Shutdown\
            \ completed for {member_name}\"`` on success, or error."
          name: shutdown_request
          parameters:
            additionalProperties: false
            properties:
              member_name:
                description: Name of the member to shut down.
                type: string
            required:
            - member_name
            type: object
          strict: true
        type: function
